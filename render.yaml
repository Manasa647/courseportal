services:
  - type: web
    name: sgei-portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx ts-node prisma/seed.ts && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        value: ""
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
