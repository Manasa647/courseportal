services:
  - type: web
    name: sgei-portal-backend
    env: node
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
        value: ""
      - key: PORT
        value: "5000"
