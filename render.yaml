services:
  - type: web
    name: sgei-portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && node dist/seed.js
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        value: ""
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
