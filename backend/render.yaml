services:
  - type: web
    name: course-portal-backend
    env: node
    plan: free
    rootDirectory: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 5000
